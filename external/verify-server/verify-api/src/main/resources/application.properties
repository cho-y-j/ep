server.port=8081

# ============================================
# Cargo License API (existing)
# ============================================
public.api.url=
public.api.key=

# ============================================
# KOSHA Education Certificate Verification
# ============================================
# Internal API Key for authentication
verify.api.key=${VERIFY_API_KEY:}
# Fail-closed: API 키 미설정 시 요청 거부 (운영 환경 기본값: true)
verify.api.fail-closed=${VERIFY_API_FAIL_CLOSED:true}

# KOSHA Portal Configuration
# 2026-05: portal-edu.kosha.or.kr → cobedu.kosha.or.kr 로 도메인 이전. 구 도메인은 301 redirect.
kosha.base-url=${KOSHA_BASE_URL:https://cobedu.kosha.or.kr}
kosha.endpoint=/api/portal24/bizG/p/GSECH03001/selectTrneInfo
kosha.timeout=5000

# OCR Engine Selection
# paddle(기본): 로컬 paddle-ocr(PP-OCRv5) 서버 사용 — Vision 유료(403 BILLING_DISABLED) 대체
# 그 외 값(예: google): 기존 동작 — Vision API 키 있으면 GoogleVision, 없으면 Stub
ocr.engine=${OCR_ENGINE:paddle}
# 컨테이너에서 호스트 paddle(8100) 접근 — 도커 게이트웨이 172.17.0.1 (127.0.0.1은 컨테이너 자신)
ocr.paddle.url=${PADDLE_OCR_URL:http://172.17.0.1:8100}
ocr.paddle.timeout=60000

# Google Vision OCR Configuration (REST API)
google.vision.api-key=${GOOGLE_VISION_API_KEY:}
google.vision.endpoint=https://vision.googleapis.com/v1/images:annotate
google.vision.timeout=10000

# File Upload Configuration
verify.max-file-size=10485760
verify.allowed-types=jpg,jpeg,png,pdf
# PDF rendering DPI (default: 200, max recommended: 300)
verify.pdf.dpi=200

# Verification Mode
# false: KOSHA 조회 성공 + 비교 가능한 필드 1개 이상 + 존재 필드 모두 일치 -> VALID
# true:  KOSHA 조회 성공 + 모든 비교 대상 필드 존재 + 모든 필드 일치 -> VALID
verify.strict-mode=false

# Multipart Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# RIMS (운전면허 검증) Configuration
# ============================================
rims.base-url=${RIMS_API_URL:}
rims.auth-key=${RIMS_AUTH_KEY:}
rims.secret-key=${RIMS_SECRET_KEY:}
rims.service-path=
rims.timeout=5000
rims.token-ttl-seconds=10800

# ============================================
# NTS (국세청 사업자등록정보) Configuration
# ============================================
nts.api.base-url=${NTS_API_BASE_URL:https://api.odcloud.kr/api/nts-businessman/v1}
nts.api.service-key=${NTS_API_SERVICE_KEY:}

# ============================================
# TS Car Statistics API Configuration
# (자동차 성능점검/검사정보 통계)
# ============================================
TS_CAR_API_KEY=${TS_CAR_API_KEY:}

# Logging Configuration
logging.pattern.level=%5p [verify-api:%X{requestId}]
logging.level.com.example.verifyapi=DEBUG
