services:
  postgres:
    image: postgres:16-alpine
    container_name: skep-v2-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-skep_db}
      POSTGRES_USER: ${DB_USER:-skep_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-skep_pass}
    volumes:
      - skep_v2_pg:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-skep_user} -d ${DB_NAME:-skep_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: skep-v2-redis
    ports:
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: skep-v2-backend
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-skep_db}
      DB_USER: ${DB_USER:-skep_user}
      DB_PASSWORD: ${DB_PASSWORD:-skep_pass}
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-change-in-prod-must-be-at-least-32-bytes-long}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8082,http://localhost:5173}
      SKEP_BOOTSTRAP_ADMIN_EMAIL: ${SKEP_BOOTSTRAP_ADMIN_EMAIL:-admin@skep.local}
      SKEP_BOOTSTRAP_ADMIN_PASSWORD: ${SKEP_BOOTSTRAP_ADMIN_PASSWORD:-change-me-now}
      SKEP_BOOTSTRAP_ADMIN_NAME: ${SKEP_BOOTSTRAP_ADMIN_NAME:-System Admin}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8081}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: skep-v2-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8082}:80"
    restart: unless-stopped

volumes:
  skep_v2_pg:
