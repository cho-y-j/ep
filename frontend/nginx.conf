# Rate limit zones — server block 밖. login/signup 같은 공개 endpoint 무차별 차단용.
# 키: 클라이언트 IP. 10MB 메모리 = 약 160k IP 추적.
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=public_zone:10m rate=30r/m;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 보안 헤더 — 모든 응답에 적용. clickjacking / MIME sniffing / referrer 누설 차단.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
    # HSTS — HTTPS 전용 (외부 nginx 가 TLS 종료). 1년 + preload.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP — XSS 차단. img/style/font 는 동일 출처+data:, script 는 self 만, OnlyOffice iframe 허용.
    # 'unsafe-inline' style/script — Tailwind/Vite 빌드 산출물에 inline 잔존. eval 은 차단.
    # WHY: OnlyOffice DocsAPI 가 부모 페이지에 로드돼 동적 Function() 평가 + blob: worker/iframe 을 만든다.
    # 'unsafe-eval', worker-src blob:, frame-src blob: 가 필수. (OnlyOffice 자체 origin 응답은
    # /onlyoffice/ location 에서 add_header 격리로 server-level CSP 자체가 적용되지 않음.)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://dapi.kakao.com https://t1.daumcdn.net https://*.daumcdn.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://t1.daumcdn.net https://*.daumcdn.net https://*.kakaocdn.net https://map.daumcdn.net; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://dapi.kakao.com https://*.daumcdn.net; frame-src 'self' blob:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    # docker 내부 DNS — backend 컨테이너 재시작 시 새 IP 자동 반영.
    # 변수에 upstream 을 넣고 proxy_pass 가 변수를 참조해야 nginx 가 요청 시점마다 DNS 조회.
    # (start-time 한번만 resolve 하면 backend 재시작 후 stale IP 로 502 떨어짐.)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # OnlyOffice Document Server — 두 경로:
    #  (a) /onlyoffice/* : api.js 명시 로드 — prefix strip 후 컨테이너로
    #  (b) 컨테이너가 응답 본문에서 root-relative URL 생성하는 경로 (/8.x.x-N/, /sdkjs/, /web-apps/,
    #      /cache/, /coauthoring/, /doc/, /healthcheck, /fonts/, /themes/, /info/, /welcome/,
    #      /plugins/, /internal/) — 그대로 컨테이너로 보내야 함. 아니면 SPA fallback 에 걸려
    #      iframe 이 React HTML 을 받고 errorCode -85 발생.
    location ^~ /onlyoffice/ {
        proxy_pass http://onlyoffice:80/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        # WHY: 외부 dispatch-web nginx 가 TLS 종료 후 평문 http 로 frontend 에 전달 →
        # 여기서 $scheme = http. OnlyOffice 가 이걸 받아 cache URL 을 http:// 로 만들면
        # 브라우저가 Mixed Content 로 차단. skep.on1.kr 은 항상 HTTPS 운영이므로 hardcode.
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Prefix /onlyoffice;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_connect_timeout 10s;
        client_max_body_size 30m;
        # WHY: server-level 의 SPA 용 CSP (script-src 'self' 'unsafe-inline'; worker-src 미명시;
        # frame-src 'self') 가 OnlyOffice 응답에도 always 로 덮여 OnlyOffice 가 만드는
        # eval / blob worker / blob iframe 이 차단된다. 여기서 add_header 를 한 줄이라도 명시하면
        # nginx 가 server-level add_header 를 모두 무시하므로, OnlyOffice 에 필요한 헤더만 재명시.
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # OnlyOffice 가 iframe / 응답 본문에서 만드는 root-relative path.
    location ~ ^/(\d+\.\d+\.\d+-\d+|sdkjs|web-apps|cache|coauthoring|doc|healthcheck|fonts|themes|info|welcome|plugins|internal)(/|$) {
        proxy_pass http://onlyoffice:80;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_connect_timeout 10s;
        client_max_body_size 30m;
        # 위 /onlyoffice/ 와 동일 — server-level CSP 가 OnlyOffice 자산 응답에 따라붙으면 동작 차단.
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # OCR preview — Google Vision 호출 비용 보호. 분당 30회 cap.
    location ~ ^/api/documents/ocr-preview {
        limit_req zone=public_zone burst=10 nodelay;
        limit_req_status 429;
        set $upstream_backend "backend:8080";
        proxy_pass http://$upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 12m;
        proxy_read_timeout 60s;
    }

    # 공개 인증 endpoint — 분당 10회 무차별 대입 차단 (burst 5 까지 허용)
    location ~ ^/api/auth/(login|signup|refresh)$ {
        limit_req zone=auth_zone burst=5 nodelay;
        limit_req_status 429;
        set $upstream_backend "backend:8080";
        proxy_pass http://$upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # 공개 사인 / OnlyOffice callback / 메일 링크 — 분당 30회 (token 보유자만 의미 있는 요청)
    location ~ ^/api/(sign/|worksheet/onlyoffice-callback/|onlyoffice/work-plan/[^/]+/callback) {
        limit_req zone=public_zone burst=10 nodelay;
        limit_req_status 429;
        set $upstream_backend "backend:8080";
        proxy_pass http://$upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50m;
        proxy_read_timeout 120s;
    }

    # STOMP over WebSocket — ADMIN/BP 안전알림 실시간 구독.
    location ^~ /ws-raw {
        set $upstream_backend "backend:8080";
        proxy_pass http://$upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location /api/ {
        # WHY: 변수 (`set $upstream_backend ...`) 를 쓰면 nginx 의 trailing-slash path 재작성
        # (`proxy_pass http://x/api/;`) 가 작동 안 해 backend 가 잘못된 path 받음 → Spring Security 403.
        # 해결: `proxy_pass http://$upstream;` 형태로 path 없이 forward 하면 nginx 가 원래 URI 그대로 전달.
        set $upstream_backend "backend:8080";
        proxy_pass http://$upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 큰 파일 업로드 (사업자등록증 PDF/이미지, 카메라 원본 30MB 이상 가능) 대응
        client_max_body_size 50m;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # 해시된 자산은 영구 캐시 (filename에 hash 있음)
    # nginx 특성: 같은 location 에 add_header 가 있으면 상위 server 레벨 add_header 가 *모두 무시*된다.
    # 그래서 보안 헤더를 여기서도 다시 명시한다.
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # WHY: OnlyOffice DocsAPI 가 부모 페이지에 로드돼 동적 Function() 평가 + blob: worker/iframe 을 만든다.
    # 'unsafe-eval', worker-src blob:, frame-src blob: 가 필수. (OnlyOffice 자체 origin 응답은
    # /onlyoffice/ location 에서 add_header 격리로 server-level CSP 자체가 적용되지 않음.)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://dapi.kakao.com https://t1.daumcdn.net https://*.daumcdn.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://t1.daumcdn.net https://*.daumcdn.net https://*.kakaocdn.net https://map.daumcdn.net; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://dapi.kakao.com https://*.daumcdn.net; frame-src 'self' blob:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'" always;
    }

    # index.html 은 매번 검증 — 새 bundle 참조를 즉시 반영
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # WHY: OnlyOffice DocsAPI 가 부모 페이지에 로드돼 동적 Function() 평가 + blob: worker/iframe 을 만든다.
    # 'unsafe-eval', worker-src blob:, frame-src blob: 가 필수. (OnlyOffice 자체 origin 응답은
    # /onlyoffice/ location 에서 add_header 격리로 server-level CSP 자체가 적용되지 않음.)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://dapi.kakao.com https://t1.daumcdn.net https://*.daumcdn.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://t1.daumcdn.net https://*.daumcdn.net https://*.kakaocdn.net https://map.daumcdn.net; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://dapi.kakao.com https://*.daumcdn.net; frame-src 'self' blob:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
